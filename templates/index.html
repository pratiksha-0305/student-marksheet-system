<!DOCTYPE html>
<html>
<head>
    <title>Student Marksheet System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 250px;
        }

        button {
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 15px;
            width: 350px;
        }
    </style>
</head>
<body>

    <h1>Student Marksheet System</h1>

    <form method="POST">

        <input type="text" name="name" placeholder="Student Name" required><br>

        <input type="text" name="roll_no" placeholder="Roll Number" required><br>

        <input type="number" name="english" placeholder="English Marks" required><br>

        <input type="number" name="physics" placeholder="Physics Marks" required><br>

        <input type="number" name="chemistry" placeholder="Chemistry Marks" required><br>

        <input type="number" name="maths" placeholder="Maths Marks" required><br>

        <input type="number" name="biology" placeholder="Biology Marks" required><br>

        <button type="submit">Generate Marksheet</button>

    </form>

    {% if result %}
    <div class="result">
        <h2>Result</h2>

        <p><strong>Name:</strong> {{ result.name }}</p>
        <p><strong>Roll Number:</strong> {{ result.roll_no }}</p>
        <p><strong>Total Marks:</strong> {{ result.total }}</p>
        <p><strong>Percentage:</strong> {{ result.percentage }}%</p>
        <p><strong>Grade:</strong> {{ result.grade }}</p>
    </div>
    {% endif %}

</body>
</html>
